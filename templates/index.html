<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLE Indoor Tracking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1 { font-size: 1.5rem; font-weight: 700; color: #38bdf8; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem; }

    /* ---- Section headers ---- */
    h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #1e293b;
    }

    /* ---- Gateway cards ---- */
    #tracking-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .gw-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      overflow: hidden;
    }

    .gw-header {
      background: #0f172a;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #334155;
    }

    .gw-name {
      font-size: 1rem;
      font-weight: 600;
      color: #38bdf8;
    }

    .gw-mac {
      font-size: 0.72rem;
      color: #64748b;
      font-family: monospace;
    }

    .gw-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    .gw-table th {
      background: #162032;
      color: #64748b;
      text-align: left;
      padding: 0.4rem 0.75rem;
      font-weight: 500;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .gw-table td {
      padding: 0.45rem 0.75rem;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
    }

    .gw-table tr:last-child td { border-bottom: none; }
    .gw-table tr:hover td { background: #162032; }

    .rssi-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .rssi-pill {
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.1rem 0.4rem;
      border-radius: 0.3rem;
      font-weight: 600;
    }

    .rssi-strong { background: #14532d; color: #4ade80; }
    .rssi-medium { background: #713f12; color: #fbbf24; }
    .rssi-weak   { background: #450a0a; color: #f87171; }

    .tag-name { font-weight: 500; color: #e2e8f0; }
    .tag-mac  { font-family: monospace; font-size: 0.75rem; color: #64748b; }

    .no-tags { padding: 1rem; color: #475569; font-size: 0.82rem; font-style: italic; }

    /* ---- Status bar ---- */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      font-size: 0.8rem;
      color: #64748b;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ---- Naming panel ---- */
    #naming-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 640px) {
      #naming-section { grid-template-columns: 1fr; }
    }

    .naming-panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1rem;
    }

    .naming-panel h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.75rem;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .name-row .mac-label {
      font-family: monospace;
      font-size: 0.75rem;
      color: #64748b;
      min-width: 140px;
      flex-shrink: 0;
    }

    .name-row input[type="text"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      color: #e2e8f0;
      border-radius: 0.375rem;
      padding: 0.3rem 0.5rem;
      font-size: 0.82rem;
      outline: none;
    }

    .name-row input[type="text"]:focus {
      border-color: #38bdf8;
    }

    .name-row button {
      background: #0369a1;
      color: #e0f2fe;
      border: none;
      border-radius: 0.375rem;
      padding: 0.3rem 0.65rem;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .name-row button:hover { background: #0284c7; }

    .save-feedback {
      font-size: 0.72rem;
      color: #4ade80;
      min-width: 2rem;
    }

    .empty-msg { color: #475569; font-size: 0.82rem; font-style: italic; }
  </style>
</head>
<body>

  <h1>BLE Indoor Tracking</h1>
  <p class="subtitle">Minew G1 gateways &bull; MQTT</p>

  <div id="status-bar">
    <span class="dot"></span>
    <span id="status-text">Connecting&hellip;</span>
  </div>

  <h2>Live View</h2>
  <div id="tracking-grid"><p class="empty-msg">Waiting for gateway data&hellip;</p></div>

  <h2>Name Gateways &amp; Tags</h2>
  <div id="naming-section">
    <div class="naming-panel">
      <h3>Gateways</h3>
      <div id="gw-naming"><p class="empty-msg">No gateways seen yet.</p></div>
    </div>
    <div class="naming-panel">
      <h3>Tags</h3>
      <div id="tag-naming"><p class="empty-msg">No tags seen yet.</p></div>
    </div>
  </div>

<script>
const REFRESH_MS = 3000;

function rssiClass(rssi) {
  if (rssi >= -60) return 'rssi-strong';
  if (rssi >= -75) return 'rssi-medium';
  return 'rssi-weak';
}

function timeSince(isoStr) {
  try {
    const diff = Math.round((Date.now() - new Date(isoStr).getTime()) / 1000);
    if (diff < 60) return `${diff}s ago`;
    return `${Math.floor(diff/60)}m ago`;
  } catch { return ''; }
}

function buildTrackingGrid(gateways) {
  const grid = document.getElementById('tracking-grid');
  if (!gateways.length) {
    grid.innerHTML = '<p class="empty-msg">Waiting for gateway data&hellip;</p>';
    return;
  }
  grid.innerHTML = gateways.map(gw => {
    const displayName = gw.name || gw.mac;
    const tagsHtml = gw.tags.length === 0
      ? '<p class="no-tags">No active tags nearby.</p>'
      : `<table class="gw-table">
          <thead><tr>
            <th>Tag</th>
            <th>RSSI</th>
            <th>Seen</th>
          </tr></thead>
          <tbody>
            ${gw.tags.map(t => `
              <tr>
                <td>
                  <div class="tag-name">${escHtml(t.name || t.mac)}</div>
                  ${t.name ? `<div class="tag-mac">${escHtml(t.mac)}</div>` : ''}
                </td>
                <td>
                  <span class="rssi-pill ${rssiClass(t.rssi)}">${t.rssi} dBm</span>
                </td>
                <td style="color:#64748b">${timeSince(t.last_seen)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;
    return `
      <div class="gw-card">
        <div class="gw-header">
          <div class="gw-name">${escHtml(displayName)}</div>
          ${gw.name ? `<div class="gw-mac">${escHtml(gw.mac)}</div>` : ''}
        </div>
        ${tagsHtml}
      </div>`;
  }).join('');
}

function buildNamingPanel(items, containerId, endpoint) {
  const el = document.getElementById(containerId);
  if (!items.length) {
    el.innerHTML = '<p class="empty-msg">Nothing seen yet.</p>';
    return;
  }
  el.innerHTML = items.map(item => `
    <div class="name-row" id="row-${item.mac_raw}">
      <span class="mac-label">${escHtml(item.mac)}</span>
      <input type="text" value="${escHtml(item.name)}" placeholder="Enter name…"
             data-mac="${item.mac_raw}" data-endpoint="${endpoint}">
      <button onclick="saveName(this.previousElementSibling)">Save</button>
      <span class="save-feedback" id="fb-${item.mac_raw}"></span>
    </div>`).join('');
}

async function saveName(input) {
  const mac = input.dataset.mac;
  const endpoint = input.dataset.endpoint;
  const name = input.value.trim();
  if (!name) return;
  try {
    const r = await fetch(`/api/${endpoint}/${mac}/name`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name})
    });
    const fb = document.getElementById(`fb-${mac}`);
    if (r.ok) {
      fb.textContent = 'Saved';
      setTimeout(() => { fb.textContent = ''; }, 2000);
    } else {
      fb.textContent = 'Error';
    }
  } catch { /* ignore */ }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refresh() {
  try {
    const r = await fetch('/api/data');
    const data = await r.json();

    buildTrackingGrid(data.gateways);

    // Don't rebuild naming panels while user is typing in one
    const namingFocused = document.activeElement &&
      document.activeElement.closest('#naming-section');
    if (!namingFocused) {
      buildNamingPanel(data.all_gateways, 'gw-naming', 'gateway');
      buildNamingPanel(data.all_tags, 'tag-naming', 'tag');
    }

    const total = data.gateways.reduce((s, g) => s + g.tags.length, 0);
    document.getElementById('status-text').textContent =
      `${data.gateways.length} gateway(s) · ${total} active tag(s) · updated ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    document.getElementById('status-text').textContent = 'Connection error';
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
